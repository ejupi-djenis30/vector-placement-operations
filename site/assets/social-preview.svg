<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">VECTOR — Every placement, one clear picture</title>
  <desc id="description">A navy and cream preview of the VECTOR placement operations workspace.</desc>
  <defs>
